<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI Signal</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Redirects 404s back to index.html preserving the path
    var base = '/AI/Newsletters/AI_Signal/';
    var path = window.location.pathname.replace(base, '');
    var search = window.location.search;
    var hash = window.location.hash;
    window.location.replace(base + '?p=' + encodeURIComponent(path) + (search ? '&q=' + encodeURIComponent(search.slice(1)) : '') + hash);
  </script>
</head>
<body></body>
</html>
